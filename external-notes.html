<!DOCTYPE html>
<html>
<head>
    <title>Slide Notes View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            height: 100vh; 
            font-family: Arial, sans-serif; 
            background-color: #050505; 
            color: #ddd; 
            overflow-y: auto;
            padding: 40px;
        }
        
        /* Replicate main window typography styles */
        #header-display {
            font-size: 30px;
            color: #ddd;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        #slide-count {
            position: fixed;
            top: 10px;
            right: 20px;
            font-size: 40px;
            font-weight: bold;
            color: rgba(255,255,255,0.1);
            z-index: 10;
        }

        #content-display { font-size: 18px; line-height: 1.6; }
        #content-display h1, #content-display h2, #content-display h3 { color: #fff; margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #content-display ul, #content-display ol { padding-left: 25px; margin-bottom: 10px; }
        #content-display p { margin-bottom: 10px; }
        #content-display blockquote { border-left: 4px solid #888; margin: 10px 0; padding-left: 15px; color: #aaa; font-style: italic; background: #111; padding: 5px;}
        #content-display a { color: #fff; text-decoration: underline; }
        mark { background-color: #fff; color: black; border-radius: 2px; padding: 0 2px; font-weight: bold; }
        #content-display pre { background: #1e1e1e !important; padding: 10px; border-radius: 6px; overflow-x: auto; border: 1px solid #333; margin: 10px 0; }
        #content-display code { font-family: 'Consolas', 'Courier New', monospace; font-size: 15px; }
        #content-display :not(pre) > code { background: #2d2d2d; padding: 2px 5px; border-radius: 4px; color: #ccc; border: 1px solid #444; }
        #content-display table { border-collapse: collapse; width: 100%; margin: 15px 0; font-size: 16px; border: 1px solid #444; }
        #content-display th, #content-display td { border: 1px solid #444; padding: 8px 12px; text-align: left; }
        #content-display th { background-color: #222; color: #fff; font-weight: bold; }
        #content-display tr:nth-child(even) { background-color: #111; }
        #content-display tr:nth-child(odd) { background-color: #161616; }

        /* Bionic reading replication */
        #content-display strong { font-weight: 650; color: #e8e8e8; opacity: 0.95; letter-spacing: 0.01em; }
        #content-display { color: #b8b8b8; }
    </style>
</head>
<body>

    <div id="slide-count"></div>
    <div id="header-display">Waiting for sync...</div>
    <div id="content-display"></div>

    <script>
        const { ipcRenderer } = require('electron');

        const headerDisplay = document.getElementById('header-display');
        const contentDisplay = document.getElementById('content-display');
        const slideCount = document.getElementById('slide-count');

        // Listen for the broadcast from the main window
        ipcRenderer.on('update-notes-view', (event, data) => {
            slideCount.innerText = data.count || '';
            headerDisplay.innerHTML = data.header || '<i>(No Header)</i>';
            contentDisplay.innerHTML = data.htmlContent || '';

            // Render KaTeX math if it exists in the slide
            if (typeof renderMathInElement !== 'undefined') { 
                renderMathInElement(contentDisplay, { 
                    delimiters: [
                        {left: '$$', right: '$$', display: true}, 
                        {left: '$', right: '$', display: false}
                    ], 
                    throwOnError: false 
                }); 
            }
        });
    </script>
</body>
</html>
