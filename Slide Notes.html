<!DOCTYPE html>
<html>
<head>
    <title>Slide Notes</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 38.25 42.94'%3E%3Cpath d='M17.39.97L2.23 9.72a3.46 3.46 0 0 0-1.73 3v17.5a3.46 3.46 0 0 0 1.73 3l15.16 8.75a3.45 3.45 0 0 0 3.46 0l15.16-8.75a3.46 3.46 0 0 0 1.73-3v-17.5a3.46 3.46 0 0 0-1.73-3L20.85.97a3.45 3.45 0 0 0-3.46 0z' fill='%23181919' stroke='%23231f20' stroke-miterlimit='10'/%3E%3Cpath d='M5.94 28.84l12.92 7.46a.53.53 0 0 0 .52 0l12.92-7.46a.51.51 0 0 0 0-.89l-12.92-7.47a.53.53 0 0 0-.52 0L5.94 27.97a.51.51 0 0 0 0 .87z' fill='%2358595b' opacity='.92'/%3E%3Cpath d='M5.94 21.91l12.92 7.47a.53.53 0 0 0 .52 0l12.92-7.47a.5.5 0 0 0 0-.88l-12.92-7.47a.53.53 0 0 0-.52 0L5.94 21.03a.5.5 0 0 0 0 .88z' fill='%23939598' opacity='.89'/%3E%3Cpath d='M5.94 14.97l12.92 7.47a.53.53 0 0 0 .52 0l12.92-7.47a.51.51 0 0 0 0-.89L19.38 6.62a.53.53 0 0 0-.52 0L5.94 14.08a.51.51 0 0 0 0 .89z' fill='%23d1d3d4' opacity='.93'/%3E%3C/svg%3E">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

    <style>
        @font-face {
            font-family: 'AdobeClean-Regular';
            src: local('Adobe Clean Regular'), local('AdobeClean-Regular');
        }
        @font-face {
            font-family: 'AdobeClean-Bold';
            src: local('Adobe Clean Bold'), local('AdobeClean-Bold');
        }
        * { box-sizing: border-box; }
        body { margin: 0; height: 100vh; font-family: 'AdobeClean-Regular', Arial, sans-serif; background-color: black; color: white; overflow: hidden; display: flex; flex-direction: column; }
        
        /* --- TOP MENU BAR --- */
        #app-menu-bar {
            flex: 0 0 40px; background: #111; border-bottom: 1px solid #222;
            display: flex; align-items: center; padding: 0 15px; gap: 0; z-index: 105; /* High z-index to stay on top */
        }
        #app-logo {
            width: 30px; height: 30px; margin-right: 5px; opacity: 0.9;
            transition: opacity 0.2s ease;
        }
        #app-logo:hover { opacity: 1; }
        .menu-trigger {
            background: none;
            border: 1px solid transparent;
            color: #888;
            padding: 4px 8px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            font-family: 'AdobeClean-Bold', Arial, sans-serif;
            transition: all 0.15s ease;
            margin-left: 0;
            margin-right: 0;
        }
        .menu-trigger:hover {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
        }

        /* Menu Dropdown */
        .menu-dropdown {
            display: none; position: absolute; top: 40px;
            background: #1a1a1a; border: 1px solid #444; border-radius: 0 0 6px 6px;
            min-width: 220px; z-index: 110; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            padding: 5px 0; max-height: 80vh; overflow-y: auto;
        }
        .menu-dropdown.active { display: block; }
        .menu-section { border-bottom: 1px solid #333; padding: 5px 0; }
        .menu-section:last-child { border-bottom: none; }
        .menu-label { padding: 4px 15px; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; font-family: 'AdobeClean-Regular', Arial, sans-serif; }
        .menu-item {
            display: block; width: 100%; padding: 8px 15px; text-align: left;
            background: transparent; border: none; color: #ccc; font-size: 13px; cursor: pointer;
            font-family: 'AdobeClean-Regular', Arial, sans-serif;
        }
        .menu-item:hover { background: #222; color: #fff; }
        .menu-item.danger { color: #ff6666; }
        .menu-item.danger:hover { background: #300; }

        /* Checkbox in Menu */
        .menu-checkbox {
            display: flex; align-items: center; padding: 8px 15px; cursor: pointer; color: #ccc; font-size: 13px;
            font-family: 'AdobeClean-Regular', Arial, sans-serif;
        }
        .menu-checkbox:hover { background: #222; color: #fff; }
        .menu-checkbox input { margin-right: 10px; accent-color: #888; }

        /* Sliders in Menu */
        .slider-item { padding: 5px 15px; display: flex; flex-direction: column; }
        .slider-item label { font-size: 11px; color: #888; margin-bottom: 2px; font-family: 'AdobeClean-Regular', Arial, sans-serif; }
        .slider-item input { width: 100%; cursor: pointer; accent-color: #888; }

        /* Save Status Indicator */
        #btn-save-status {
            margin-left: auto;
            background: transparent;
            border: none;
            color: transparent;
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            box-shadow: none;
            transition: all 0.15s ease;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        #btn-save-status.saved svg circle {
            fill: none;
            stroke: #fff;
            stroke-width: 2;
        }

        #btn-save-status.unsaved svg circle {
            fill: #fff;
        }

        /* --- HEADER & CONTENT --- */
        #sticky-header-group { flex: 0 0 auto; background: #000; border-bottom: 1px solid #222; padding: 10px 0px; z-index: 50; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100px; }
        #display { position: absolute; right: 20px; top: 5px; font-size: 80px; font-weight: bold; font-family: 'AdobeClean-Bold', Arial, sans-serif; user-select: none; line-height: 1; white-space: nowrap; text-align: right; z-index: 20; text-shadow: 0 0 5px black; }
        
        #slideLabel { background: transparent; border-bottom: 1px solid #333; color: #ddd; font-size: 30px; outline: none; padding-bottom: 2px; margin-bottom: 10px; min-width: 200px; max-width: 60%; text-align: center; transition: border-color 0.2s; cursor: text; display: block; }
        #slideLabel:focus { border-bottom: 1px solid #fff; }
        
        /* SIDEBAR TOGGLE (Hamburger) */
        #sidebar-toggle {
            position: absolute; 
            top: 50px; /* Below the 40px menu bar + spacing */
            left: 10px; 
            z-index: 102; 
            background: transparent; 
            border: none; 
            font-size: 24px; 
            cursor: pointer; 
            color: #555;
            transition: left 0.2s ease, color 0.2s;
        }
        #sidebar-toggle:hover { color: #fff; }
        #sidebar-toggle.active {
            left: 260px; /* Move with sidebar width (250px) + padding */
        }

        #sidebar {
            position: absolute; top: 0; left: 0; width: 250px; height: 100%;
            background: #111; border-right: 1px solid #333; z-index: 90;
            transform: translateX(-100%); transition: transform 0.2s ease;
            display: flex; flex-direction: column; padding-top: 60px; /* Space for top bar */
            min-width: 150px; max-width: 80vw;
        }
        #sidebar.active { transform: translateX(0); }
        
        #resizer { width: 10px; height: 100%; position: absolute; right: 0; top: 0; cursor: col-resize; z-index: 100; background: transparent; }
        #resizer:hover { background: rgba(255, 255, 255, 0.1); }
        #toc-list { overflow-y: auto; flex: 1; padding: 10px; }
        #toc-list::-webkit-scrollbar { width: 5px; }
        #toc-list::-webkit-scrollbar-thumb { background: #333; }
        .toc-item { padding: 8px; border-bottom: 1px solid #222; cursor: pointer; font-size: 13px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 10px; position: relative; }
        .toc-item:hover { background: #333; color: #fff; }
        .toc-item.current { background: #333; color: #fff; border-left: 3px solid #fff; }
        .toc-num { font-weight: bold; min-width: 25px; text-align: right; }
        .toc-item.is-note .toc-num { background: #ddd; color: #000; border-radius: 50%; width: 22px; height: 22px; min-width: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; margin-right: 3px; }
        .toc-item.is-note { color: #aaa; } .toc-item.is-note:hover { color: #fff; }
        
        /* Heading Levels - Indentation */
        .toc-item.level-1 { padding-left: 8px; font-weight: bold; font-size: 14px; font-family: 'AdobeClean-Bold', Arial, sans-serif; }
        .toc-item.level-2 { padding-left: 20px; font-size: 13px; }
        .toc-item.level-3 { padding-left: 32px; font-size: 13px; }
        .toc-item.level-4 { padding-left: 44px; font-size: 12px; }
        .toc-item.level-5 { padding-left: 56px; font-size: 12px; }
        .toc-item.level-6 { padding-left: 68px; font-size: 12px; }
        
        /* Context Menu for Sidebar */
        #toc-context-menu {
            display: none;
            position: fixed;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            min-width: 180px;
            z-index: 150;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            padding: 5px 0;
        }
        #toc-context-menu.active { display: block; }
        .context-menu-header {
            padding: 4px 15px;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            margin-bottom: 5px;
        }
        .context-menu-item {
            display: block;
            width: 100%;
            padding: 8px 15px;
            text-align: left;
            background: transparent;
            border: none;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .context-menu-item:hover { background: #222; color: #fff; }
        .context-menu-item .level-indicator {
            color: #666;
            font-size: 11px;
            font-family: monospace;
        }

        #pdf-render-container { display: none; justify-content: center; align-items: center; width: 100%; height: 30vh; position: relative; transition: height 0.1s ease; }
        #the-canvas { max-height: 100%; max-width: 100%; border: 1px solid #333; position: absolute; z-index: 1; }
        #the-canvas.inverted { filter: invert(1); }
        #no-pdf-msg { color: #444; font-style: italic; position: absolute; font-size: 14px; z-index: 0; }
        .textLayer { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 3; opacity: 1; mix-blend-mode: multiply; line-height: 1.0; pointer-events: auto; }
        .textLayer ::selection { background: rgba(0, 0, 255, 0.3); }
        .textLayer span { color: transparent; position: absolute; white-space: pre; cursor: text; transform-origin: 0% 0%; }
        
        #notes-container { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; border-top: 1px solid #111; background: #050505; }
        #notes-wrapper { width: 100%; max-width: 800px; height: 100%; padding: 20px; overflow-y: auto; position: relative; }
        #notes-wrapper::-webkit-scrollbar { width: 10px; }
        #notes-wrapper::-webkit-scrollbar-track { background: #111; }
        #notes-wrapper::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
        #slideNotesEditor { width: 100%; min-height: 100%; background: transparent; border: none; color: #aaa; font-size: 18px; text-align: left; outline: none; font-family: 'Consolas', 'Courier New', monospace; resize: none; line-height: 1.6; display: none; tab-size: 4; overflow: hidden; }
        #slideNotesPreview { width: 100%; min-height: 100%; color: #ddd; font-size: 18px; line-height: 1.6; display: block; cursor: text; }
        #slideNotesPreview h1, #slideNotesPreview h2, #slideNotesPreview h3 { color: #fff; margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #slideNotesPreview ul, #slideNotesPreview ol { padding-left: 25px; margin-bottom: 10px; }
        #slideNotesPreview p { margin-bottom: 10px; }
        #slideNotesPreview blockquote { border-left: 4px solid #888; margin: 10px 0; padding-left: 15px; color: #aaa; font-style: italic; background: #111; padding: 5px;}
        #slideNotesPreview a { color: #fff; text-decoration: underline; }
        mark { background-color: #fff; color: black; border-radius: 2px; padding: 0 2px; font-weight: bold; font-family: 'AdobeClean-Bold', Arial, sans-serif; }
        #slideNotesPreview pre { background: #1e1e1e !important; padding: 10px; border-radius: 6px; overflow-x: auto; border: 1px solid #333; margin: 10px 0; }
        #slideNotesPreview code { font-family: 'Consolas', 'Courier New', monospace; font-size: 15px; }
        #slideNotesPreview :not(pre) > code { background: #2d2d2d; padding: 2px 5px; border-radius: 4px; color: #ccc; border: 1px solid #444; }
        #slideNotesPreview table { border-collapse: collapse; width: 100%; margin: 15px 0; font-size: 16px; border: 1px solid #444; }
        #slideNotesPreview th, #slideNotesPreview td { border: 1px solid #444; padding: 8px 12px; text-align: left; }
        #slideNotesPreview th { background-color: #222; color: #fff; font-weight: bold; font-family: 'AdobeClean-Bold', Arial, sans-serif; }
        #slideNotesPreview tr:nth-child(even) { background-color: #111; }
        #slideNotesPreview tr:nth-child(odd) { background-color: #161616; }
        
        #rearrange-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 200; overflow-y: auto; padding: 40px; }
        #rearrange-overlay.active { display: flex; flex-direction: column; }
        #rearrange-header { flex: 0 0 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; margin-bottom: 20px; }
        #rearrange-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding-bottom: 100px; }
        .rearrange-card { background: #111; border: 1px solid #333; border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; }
        .card-pdf-preview { height: 120px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: center; align-items: center; font-size: 10px; color: #444; position: relative; }
        .card-pdf-preview canvas { max-width: 100%; max-height: 100%; }
        .card-note-box { flex: 1; padding: 10px; cursor: grab; background: #161616; transition: background 0.2s; min-height: 80px; }
        .card-note-box:hover { background: #222; }
        .card-note-box:active { cursor: grabbing; }
        .card-note-header { font-weight: bold; font-size: 12px; color: #fff; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'AdobeClean-Bold', Arial, sans-serif; }
        .card-note-excerpt { font-size: 10px; color: #888; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .rearrange-card-num { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.7); color: #fff; padding: 2px 6px; font-size: 10px; border-radius: 4px; pointer-events: none; }

        /* --- MERGE LECTURES OVERLAY --- */
        #merge-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 250; overflow-y: auto; padding: 40px; }
        #merge-overlay.active { display: flex; flex-direction: column; }
        #merge-header { flex: 0 0 auto; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; margin-bottom: 20px; padding-bottom: 15px; }
        #merge-header h2 { margin: 0; font-size: 20px; color: #fff; }
        .merge-instructions { color: #888; font-size: 13px; margin-bottom: 20px; line-height: 1.6; }
        #merge-file-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .merge-file-card {
            background: #111; border: 1px solid #333; border-radius: 8px; padding: 15px;
            display: flex; align-items: center; gap: 15px; cursor: grab; transition: all 0.2s;
        }
        .merge-file-card:hover { border-color: #555; background: #161616; }
        .merge-file-card:active { cursor: grabbing; }
        .merge-file-handle { font-size: 20px; color: #666; user-select: none; }
        .merge-file-order { background: #222; color: #fff; padding: 8px 12px; border-radius: 4px; font-weight: bold; min-width: 40px; text-align: center; font-family: 'AdobeClean-Bold', Arial, sans-serif; }
        .merge-file-info { flex: 1; }
        .merge-file-name { font-size: 16px; color: #fff; font-weight: bold; margin-bottom: 5px; font-family: 'AdobeClean-Bold', Arial, sans-serif; }
        .merge-file-stats { font-size: 12px; color: #888; }
        .merge-file-remove { background: #300; border: 1px solid #533; color: #f88; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .merge-file-remove:hover { background: #400; }
        .merge-actions { display: flex; gap: 15px; align-items: center; }
        .merge-btn-add { background: #222; border: 1px solid #444; color: #8af; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .merge-btn-add:hover { background: #333; }
        .merge-btn-execute { background: #252; border: 1px solid #353; color: #8f8; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; font-family: 'AdobeClean-Bold', Arial, sans-serif; }
        .merge-btn-execute:hover { background: #353; }
        .merge-btn-execute:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Floating Search */
        #floating-search-bar { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #050505; border: 1px solid #444; border-radius: 6px; padding: 8px 12px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.8); align-items: center; gap: 8px; }
        #floating-search-bar.active { display: flex; }
        #search-input { background: #111; border: 1px solid #333; color: white; padding: 5px 8px; font-size: 13px; border-radius: 4px; outline: none; width: 200px; }
        #search-input:focus { border-color: #666; }
        #search-count { font-size: 11px; color: #888; min-width: 50px; text-align: center; }
        .search-btn { background: transparent; border: 1px solid transparent; color: #aaa; cursor: pointer; padding: 4px 6px; border-radius: 3px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .search-btn:hover { background: #222; color: #fff; border-color: #333; }
        .search-btn svg { width: 12px; height: 12px; fill: currentColor; }
        #scanning-status { font-size: 10px; color: #555; margin-left: 5px; display: none; white-space: nowrap; }

        .hidden-file-input { display:none; }

        /* Subtle gradient effect on containing elements */
        #slideNotesPreview,
        .toc-text {
            color: #b8b8b8;
        }
    </style>
</head>
<body>

    <div id="app-menu-bar">
        <svg id="app-logo" xmlns='http://www.w3.org/2000/svg' viewBox='0 0 38.25 42.94'>
            <path d='M17.39.97L2.23 9.72a3.46 3.46 0 0 0-1.73 3v17.5a3.46 3.46 0 0 0 1.73 3l15.16 8.75a3.45 3.45 0 0 0 3.46 0l15.16-8.75a3.46 3.46 0 0 0 1.73-3v-17.5a3.46 3.46 0 0 0-1.73-3L20.85.97a3.45 3.45 0 0 0-3.46 0z' fill='#181919' stroke='#231f20' stroke-miterlimit='10'/>
            <path d='M5.94 28.84l12.92 7.46a.53.53 0 0 0 .52 0l12.92-7.46a.51.51 0 0 0 0-.89l-12.92-7.47a.53.53 0 0 0-.52 0L5.94 27.97a.51.51 0 0 0 0 .87z' fill='#58595b' opacity='.92'/>
            <path d='M5.94 21.91l12.92 7.47a.53.53 0 0 0 .52 0l12.92-7.47a.5.5 0 0 0 0-.88l-12.92-7.47a.53.53 0 0 0-.52 0L5.94 21.03a.5.5 0 0 0 0 .88z' fill='#939598' opacity='.89'/>
            <path d='M5.94 14.97l12.92 7.47a.53.53 0 0 0 .52 0l12.92-7.47a.51.51 0 0 0 0-.89L19.38 6.62a.53.53 0 0 0-.52 0L5.94 14.08a.51.51 0 0 0 0 .89z' fill='#d1d3d4' opacity='.93'/>
        </svg>
        <button class="menu-trigger" onclick="toggleMenu('file-menu')">File</button>
        <button class="menu-trigger" onclick="toggleMenu('edit-menu')">Edit</button>
        <button class="menu-trigger" onclick="toggleMenu('fixes-menu')">Fixes</button>
        <button class="menu-trigger" onclick="toggleMenu('appearance-menu')">Appearance</button>
        
        <button id="split-screen-btn" class="menu-trigger" onclick="toggleSplitScreen()" disabled style="opacity: 0.5; cursor: not-allowed; margin-left: 10px; color: #8af;">Split Screen</button>

        <button id="btn-save-status" class="saved" data-tooltip="All changes saved">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
                <circle cx="12" cy="12" r="8" />
            </svg>
        </button>
    </div>

    <div id="file-menu" class="menu-dropdown" style="left: 15px;">
        <button class="menu-item" onclick="document.getElementById('pdf-upload').click()">Open PDF</button>
        <button class="menu-item" onclick="openNotesEditable()">Open Notes</button>
        <button id="export-btn" class="menu-item" onclick="saveNotes()">Save</button>
        <button class="menu-item" onclick="saveNotesAs()">Save As New File...</button>
        <div class="menu-separator"></div>
        <button class="menu-item" onclick="openMergeLectures()">Merge Lectures...</button>
    </div>

    <div id="edit-menu" class="menu-dropdown" style="left: 70px;">
        <button class="menu-item" onclick="insertSlide(-1)">Insert Blank Before</button>
        <button class="menu-item" onclick="insertSlide(1)">Insert Blank After</button>
        <button class="menu-item danger" onclick="deleteCurrentSlide()">Delete Current Slide</button>
        <button class="menu-item" onclick="openRearrangeMenu()">Rearrange Notes</button>
    </div>

    <div id="fixes-menu" class="menu-dropdown" style="left: 130px;">
        <button class="menu-item" onclick="shiftContent(-1)">Shift Content Up</button>
        <button class="menu-item" onclick="shiftContent(1)">Shift Content Down</button>
        <button class="menu-item" onclick="syncPdfSlides()">Force Sync PDF Pages</button>
    </div>

    <div id="appearance-menu" class="menu-dropdown" style="left: 195px;">

    <script>
        const pdfCanvas = document.getElementById('the-canvas');
        const textLayerDiv = document.getElementById('text-layer');
        const pdfCtx = pdfCanvas.getContext('2d');
        const display = document.getElementById('display');
        const slideLabel = document.getElementById('slideLabel');
        const editor = document.getElementById('slideNotesEditor');
        const preview = document.getElementById('slideNotesPreview');
        const pdfContainer = document.getElementById('pdf-render-container');
        const noPdfMsg = document.getElementById('no-pdf-msg');
        
        // Add this right after: const noPdfMsg = document.getElementById('no-pdf-msg');
        const { ipcRenderer } = require('electron');
        const fs = require('fs'); // Native file system for silent saving
        let isSplitScreen = false;

        const saveStatusIndicator = document.getElementById('btn-save-status');

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        const debouncedSave = debounce(() => {
            if (window.currentJsonPath) {
                saveNotes(true);
            }
        }, 3000);

        function updateSaveStatusIndicator() {
            if (isDirty) {
                saveStatusIndicator.classList.remove('saved');
                saveStatusIndicator.classList.add('unsaved');
                saveStatusIndicator.setAttribute('data-tooltip', 'Unsaved changes...');
            } else {
                saveStatusIndicator.classList.remove('unsaved');
                saveStatusIndicator.classList.add('saved');
                saveStatusIndicator.setAttribute('data-tooltip', 'All changes saved');
            }
        }

        function toggleSplitScreen() {
            if (!pdfDoc) return; 
            isSplitScreen = !isSplitScreen;
            
            const btn = document.getElementById('split-screen-btn');
            const notesContainer = document.getElementById('notes-container');
            const pdfContainer = document.getElementById('pdf-render-container');
            const stickyHeader = document.getElementById('sticky-header-group');
            
            if (isSplitScreen) {
                notesContainer.style.display = 'none'; // Hide notes
                pdfContainer.style.height = '85vh';    // Expand PDF
                stickyHeader.style.borderBottom = 'none'; // Hide horizontal line
                btn.style.background = '#222';
                btn.style.color = '#fff';
                ipcRenderer.send('open-external-notes'); // Open window
            } else {
                notesContainer.style.display = 'flex'; // Show notes
                const sliderVal = document.querySelector('#appearance-menu input[type="range"]').value;
                pdfContainer.style.height = sliderVal + 'vh'; // Restore PDF size
                stickyHeader.style.borderBottom = '1px solid #222'; // Show horizontal line
                btn.style.background = 'transparent';
                btn.style.color = '#8af';
            }
            renderPage();
            broadcastNotes();
        }

        function broadcastNotes() {
            if (!isSplitScreen) return;
            const idx = state.count - 1;
            const slide = state.slides[idx] || { header: '', notes: '' };
            let htmlContent = typeof marked !== 'undefined' && slide.notes ? marked.parse(slide.notes) : (slide.notes || "");
            
            ipcRenderer.send('sync-slide-state', {
                header: slide.header || '',
                htmlContent: htmlContent,
                rawText: slide.notes || '', // NEW: Send the raw markdown text too!
                count: state.count,
                jsonPath: window.currentJsonPath || null
            });
        }

        // NEW: Receive edits from the external window and save them locally
        ipcRenderer.on('update-note-in-main', (event, newText) => {
            const idx = state.count - 1;
            editor.value = newText;
            if(!state.slides[idx]) state.slides[idx] = { type:'blank', header:'', notes:'' };
            state.slides[idx].notes = newText;
            isDirty = true;
            debouncedSave();
            
            // Update the main window's preview instantly
            let htmlContent = typeof marked !== 'undefined' && newText ? marked.parse(newText) : (newText || "");
            preview.innerHTML = htmlContent;
            if (typeof renderMathInElement !== 'undefined') { 
                renderMathInElement(preview, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false }); 
            }
            
            // Trigger auto-saves and UI updates
            if (saveTimeout) clearTimeout(saveTimeout); 
            saveTimeout = setTimeout(() => { pushSnapshot(idx, newText); }, 500);
            saveData(); 
            updateSidebar();
            if(isEditorActive) autoResizeTextarea();
            
            // Send the freshly processed HTML back to the external window
            broadcastNotes();
        });

            // NAVIGATION: Receive slide navigation event from main window
            ipcRenderer.on('trigger-slide-nav', (event, direction) => {
                handleNav(direction);
            });
        ipcRenderer.on('split-screen-closed', () => {
            if (isSplitScreen) toggleSplitScreen();
        });

        ipcRenderer.on('load-pdf-buffer', (event, payload) => {
            let buffer, jsonContent, jsonPath;
            
            if (payload && payload.pdfBuffer) {
                buffer = payload.pdfBuffer;
                jsonContent = payload.jsonContent;
                window.currentJsonPath = payload.jsonPath; // Store path globally!
            } else {
                buffer = payload; // legacy support
            }

            // Load PDF first
            loadPdfFromBuffer(buffer);

            // Then load JSON
            if (jsonContent) {
                loadImportedData(jsonContent);
                document.getElementById('export-btn').textContent = "💾 Save (Linked)";
            } else if (window.currentJsonPath) {
                document.getElementById('export-btn').textContent = "💾 Save (Will Link)";
            }

            // Start auto-save automatically if we have a file path
            if (window.currentJsonPath || fileHandle) {
                startAutoSave();
            }
        });

        function loadPdfFromBuffer(pdfBuffer) {
            try {
                const typedarray = new Uint8Array(pdfBuffer);
                pdfjsLib.getDocument(typedarray).promise.then(function(pdfDoc_) {
                    pdfDoc = pdfDoc_; noPdfMsg.style.display = "none"; extractAllText(pdfDoc);
                    
                    // ENABLE THE BUTTON
                    const splitBtn = document.getElementById('split-screen-btn');
                    splitBtn.disabled = false;
                    splitBtn.style.opacity = '1';
                    splitBtn.style.cursor = 'pointer';

                    if (state.slides.length <= 1 && !state.slides[0].notes && !state.slides[0].header) { state.slides = []; for(let i=1; i<=pdfDoc.numPages; i++) { state.slides.push({ type:'pdf', pdfPage:i, header:"", notes:"" }); } state.count = 1; updateDisplay(); extractPdfBookmarks(pdfDoc_); }
                    updateUIForMode(); setTimeout(() => renderPage(), 0);
                }).catch(err => {
                    console.error('Error loading PDF:', err);
                });
            } catch (err) {
                console.error('Error processing PDF buffer:', err);
            }
        }
        
        // UI Elements
        const mainMenu = document.getElementById('main-menu');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        
        const searchInput = document.getElementById('search-input');
        const searchCount = document.getElementById('search-count');
        const searchBar = document.getElementById('floating-search-bar');
        const sidebar = document.getElementById('sidebar');
        const tocList = document.getElementById('toc-list');
        const resizer = document.getElementById('resizer');
        const rearrangeOverlay = document.getElementById('rearrange-overlay');
        const rearrangeGrid = document.getElementById('rearrange-grid');
        const lastSavedDiv = document.getElementById('last-saved');
        const scanningStatus = document.getElementById('scanning-status');
        const tocContextMenu = document.getElementById('toc-context-menu');
        
        let contextMenuTargetIndex = -1;

        const offscreenCanvas = document.createElement('canvas');
        const offscreenCtx = offscreenCanvas.getContext('2d');

        try {
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) { return hljs.highlight(code, { language: lang }).value; }
                    return hljs.highlightAuto(code).value;
                },
                langPrefix: 'hljs language-'
            });
        } catch(e) { console.error("Marked/HLJS not loaded", e); }

        let state = { count: 1, slides: [] };
        state.slides = [{ type: 'blank', header: '', notes: '' }];
        
        let pdfDoc = null;
        let pdfTextIndex = []; 
        let renderTask = null;
        let searchMatches = []; 
        let currentMatchPos = -1;
        let isEditorActive = false;
        let isDirty = false;
        let historyStacks = {}; 
        let saveTimeout = null;
        let isRestoring = false;
        let fileHandle = null;
        let autoSaveInterval = null;
        let isPageRendering = false; let pageNumPending = null;
        
        // --- MERGE STATE ---
        let mergeFiles = []; // Array of {name, data}

        // --- MERGE ELEMENTS ---
        const mergeOverlay = document.getElementById('merge-overlay');
        const mergeFileList = document.getElementById('merge-file-list');
        const mergeExecuteBtn = document.getElementById('merge-execute-btn');
        const mergeJsonUpload = document.getElementById('merge-json-upload');

        // --- CORE FUNCTIONS ---

        function getHistory(index) { if (!historyStacks[index]) historyStacks[index] = { undo: [], redo: [] }; return historyStacks[index]; }
        function pushSnapshot(index, text) { if (isRestoring) return; const h = getHistory(index); if (h.undo.length > 0 && h.undo[h.undo.length - 1] === text) return; h.undo.push(text); h.redo = []; if (h.undo.length > 50) h.undo.shift(); }
        function undo(index) { const h = getHistory(index); if (h.undo.length === 0) return null; const currentText = editor.value; if (h.undo.length > 0 && h.undo[h.undo.length - 1] === currentText) { h.undo.pop(); } if (h.undo.length === 0) return null; h.redo.push(currentText); return h.undo.pop(); }
        function redo(index) { const h = getHistory(index); if (h.redo.length === 0) return null; const next = h.redo.pop(); h.undo.push(editor.value); return next; }
        function checkIfDirty() { if (state.slides.length > 1) return true; const s = state.slides[0]; if (s.header && s.header.trim() !== "") return true; if (s.notes && s.notes.trim() !== "") return true; return false; }
        function saveData() { /* Memory Only */ }
        function autoResizeTextarea() { editor.style.height = 'auto'; editor.style.height = (editor.scrollHeight) + 'px'; }

        async function extractPdfBookmarks(pdf) {
            try {
                const outline = await pdf.getOutline();
                if (!outline) return;

                for (const item of outline) {
                    if (item.dest) {
                        let dest = item.dest;
                        if (typeof dest === 'string') {
                            dest = await pdf.getDestination(dest);
                        }

                        if (dest && dest[0]) {
                            try {
                                const pageIndex = await pdf.getPageIndex(dest[0]);
                                const pageNum = pageIndex + 1;

                                const slide = state.slides.find(s => s.type === 'pdf' && s.pdfPage === pageNum);
                                
                                // Only overwrite if the current header is completely blank
                                if (slide && (!slide.header || slide.header.trim() === '')) {
                                    let bookmarkTitle = (item.title || '').trim();

                                    // SUPER-CHOPPER: remove leading generic prefixes like
                                    // "Slide 8:", "Slide: 8", "Slide 8 - ", "Page 8:", etc.
                                    // Upgraded to catch "Number", "No.", "num", and "#" variants
                                    let cleanTitle = bookmarkTitle.replace(/^(?:slide|page)\s*(?:number|num|no\.?|#)?\s*[:\-.]?\s*\d+\s*[:\-.]?\s*/i, '').trim();

                                    if (cleanTitle !== '') {
                                        slide.header = cleanTitle;
                                    }
                                }
                            } catch (e) {
                                console.warn('Could not map bookmark to page', e);
                            }
                        }
                    }
                }

                // Force the UI to refresh with the new headers
                updateDisplay();
                updateSidebar();
                isDirty = true;
                debouncedSave();
                updateSaveStatusIndicator();
            } catch (error) {
                console.error('Error extracting PDF bookmarks:', error);
            }
        }

        function handleInput() {
            const idx = state.count - 1; const newText = editor.value; isDirty = true; debouncedSave(); updateSaveStatusIndicator(); autoResizeTextarea();
            if(!state.slides[idx]) state.slides[idx] = { type:'blank', header:'', notes:'' };
            state.slides[idx].header = slideLabel.innerText; state.slides[idx].notes = newText; 
            if (saveTimeout) clearTimeout(saveTimeout); saveTimeout = setTimeout(() => { pushSnapshot(idx, newText); }, 500);
            saveData(); updateSidebar(); 
            
            broadcastNotes(); // ADD THIS LINE HERE
        }

        function updateDisplay() {
            const idx = state.count - 1; const slide = state.slides[idx] || { type:'blank', header:'', notes:'' };
            slideLabel.innerText = slide.header || ""; editor.value = slide.notes || "";
            if (!historyStacks[idx]) historyStacks[idx] = { undo: [], redo: [] };
            let htmlContent = "";
                if (typeof marked !== 'undefined') { htmlContent = slide.notes ? marked.parse(slide.notes) : ''; } else htmlContent = slide.notes || "";
            preview.innerHTML = htmlContent;
            if (typeof renderMathInElement !== 'undefined') { renderMathInElement(preview, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false }); }
            if (slide.type === 'blank') { 
                pdfContainer.style.display = 'none'; 
            } else { 
                pdfContainer.style.display = 'flex'; 
                if (pdfCanvas.width === 0 && pdfDoc) renderPage(); 
            }
            display.textContent = state.count;
            updateSidebar(); if(isEditorActive) autoResizeTextarea();
            
            broadcastNotes(); // ADD THIS LINE HERE
        }

        function toggleSidebar() { 
            sidebar.classList.toggle('active'); 
            sidebarToggle.classList.toggle('active');
            if (sidebar.classList.contains('active')) {
                const sidebarWidth = sidebar.offsetWidth;
                sidebarToggle.style.left = (sidebarWidth + 10) + 'px';
            } else {
                sidebarToggle.style.left = '10px';
            }
        }

        function updateSidebar() {
            let html = "";
            state.slides.forEach((slide, index) => {
                const num = index + 1;
                const isCurrent = (num === state.count);
                const isBlank = (slide.type === 'blank');
                let title = slide.header ? slide.header : (isBlank ? "<i>(Note Slide)</i>" : `Slide ${num}`);
                const level = slide.level || 0;
                const levelClass = level > 0 ? `level-${level}` : '';
                html += `<div class="toc-item ${isCurrent ? 'current' : ''} ${isBlank ? 'is-note' : ''} ${levelClass}" 
                    onclick="jumpToSlide(${num})" 
                    oncontextmenu="showTocContextMenu(event, ${index}); return false;">
                    <span class="toc-num">${num}</span><span class="toc-text">${title}</span>
                </div>`;
            });
            tocList.innerHTML = html;
        }
        function jumpToSlide(num) { if (isEditorActive) activatePreview(); state.count = num; updateDisplay(); renderPage(); }
        
        // --- HEADING LEVEL FUNCTIONS ---
        function showTocContextMenu(event, index) {
            event.preventDefault();
            event.stopPropagation();
            contextMenuTargetIndex = index;
            tocContextMenu.style.left = event.clientX + 'px';
            tocContextMenu.style.top = event.clientY + 'px';
            tocContextMenu.classList.add('active');
        }
        
        function setSlideLevel(index, level) {
            if (index >= 0 && index < state.slides.length) {
                if (level === null) {
                    delete state.slides[index].level;
                } else {
                    state.slides[index].level = level;
                }
                isDirty = true;
                debouncedSave();
                saveData();
                updateSidebar();
            }
            tocContextMenu.classList.remove('active');
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // --- MERGE LECTURES FUNCTIONS ---
        function openMergeLectures() {
            mergeOverlay.classList.add('active');
            mergeFiles = [];
            renderMergeFileList();
            document.querySelectorAll('.menu-dropdown').forEach(m => m.classList.remove('active'));
        }

        function closeMergeLectures() {
            mergeOverlay.classList.remove('active');
            mergeFiles = [];
            renderMergeFileList();
        }

        mergeJsonUpload.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const data = JSON.parse(event.target.result);
                        
                        // Ensure data has required structure
                        if (!data.slides) data.slides = [];
                        
                        mergeFiles.push({
                            name: file.name,
                            data: data
                        });
                        
                        renderMergeFileList();
                    } catch (err) {
                        alert(`Error reading ${file.name}: Invalid JSON`);
                    }
                };
                reader.readAsText(file);
            });
            
            // Reset input
            e.target.value = '';
        });

        function renderMergeFileList() {
            if (mergeFiles.length === 0) {
                mergeFileList.innerHTML = '<div style="color:#666; font-style:italic; text-align:center; padding:40px;">No files loaded yet. Click "Add Lecture Files" to get started.</div>';
                mergeExecuteBtn.disabled = true;
                return;
            }
            
            mergeExecuteBtn.disabled = false;
            
            let html = '';
            mergeFiles.forEach((file, index) => {
                const slideCount = file.data.slides?.length || 0;
                
                html += `
                    <div class="merge-file-card" draggable="true" data-index="${index}">
                        <span class="merge-file-handle">⋮⋮</span>
                        <div class="merge-file-order">${index + 1}</div>
                        <div class="merge-file-info">
                            <div class="merge-file-name">${escapeHtml(file.name)}</div>
                            <div class="merge-file-stats">${slideCount} slides</div>
                        </div>
                        <button class="merge-file-remove" onclick="removeMergeFile(${index})">Remove</button>
                    </div>
                `;
            });
            
            mergeFileList.innerHTML = html;
            
            // Add drag-and-drop handlers
            document.querySelectorAll('.merge-file-card').forEach(card => {
                card.addEventListener('dragstart', handleMergeDragStart);
                card.addEventListener('dragover', handleMergeDragOver);
                card.addEventListener('drop', handleMergeDrop);
                card.addEventListener('dragenter', e => e.preventDefault());
            });
        }

        let mergeDragSrcIndex = -1;

        function handleMergeDragStart(e) {
            mergeDragSrcIndex = parseInt(this.dataset.index);
            e.dataTransfer.effectAllowed = 'move';
            this.style.opacity = '0.4';
        }

        function handleMergeDragOver(e) {
            if (e.preventDefault) e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleMergeDrop(e) {
            if (e.stopPropagation) e.stopPropagation();
            
            const targetIndex = parseInt(this.dataset.index);
            
            if (mergeDragSrcIndex !== targetIndex) {
                // Swap files
                const temp = mergeFiles[mergeDragSrcIndex];
                mergeFiles[mergeDragSrcIndex] = mergeFiles[targetIndex];
                mergeFiles[targetIndex] = temp;
                
                renderMergeFileList();
            }
            
            return false;
        }

        function removeMergeFile(index) {
            mergeFiles.splice(index, 1);
            renderMergeFileList();
        }

        async function executeMerge() {
            if (mergeFiles.length === 0) return;
            
            if (!confirm(`Merge ${mergeFiles.length} lecture files into one? This will create a new combined file.`)) return;
            
            // Initialize merged data
            const merged = {
                count: 1,
                slides: []
            };
            
            // Merge slides with corrected PDF page numbers
            let cumulativePageOffset = 0;
            
            mergeFiles.forEach((file, index) => {

        document.addEventListener('wheel', (e) => {
            const notesDiv = document.getElementById('notes-wrapper'); const sidebarDiv = document.getElementById('sidebar'); 
            if (notesDiv.contains(e.target) || sidebarDiv.contains(e.target)) return;
            const now = Date.now(); if (now - lastScrollTime < 30) return;
            if (e.deltaY > 0) { handleNav('forward'); lastScrollTime = now; } else if (e.deltaY < 0) { handleNav('backward'); lastScrollTime = now; }
        });

        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); if(e.shiftKey) nextMatch(-1); else nextMatch(1); } });
        document.addEventListener('keydown', e => {
            if (document.activeElement === editor || document.activeElement === searchInput) return;
            if (document.activeElement === slideLabel) { if (['ArrowUp','ArrowDown'].includes(e.key)) { e.preventDefault(); handleNav(e.key === 'ArrowDown' ? 'forward' : 'backward'); } if ((e.ctrlKey || e.metaKey) && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) { e.preventDefault(); handleNav(e.key === 'ArrowRight' ? 'forward' : 'backward'); } if (e.key === 'Enter') { e.preventDefault(); document.activeElement.blur(); } return; }
            if (e.key === 'i' && !isEditorActive) { pdfCanvas.classList.toggle('inverted'); if (state.slides[state.count-1].type === 'blank') renderPage(); return; }
            if ((e.ctrlKey || e.metaKey) && !e.shiftKey) { if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); handleNav('forward'); return; } if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); handleNav('backward'); return; } }
            if(e.key === 'ArrowDown' || e.key === 'ArrowRight') handleNav('forward'); else if(e.key === 'ArrowUp' || e.key === 'ArrowLeft') handleNav('backward');
        });

        // Sidebar resize functionality
        let isResizingSidebar = false;
        resizer.addEventListener('mousedown', (e) => {
            isResizingSidebar = true;
            document.body.style.cursor = 'col-resize';
            e.preventDefault();
        });
        document.addEventListener('mousemove', (e) => {
            if (!isResizingSidebar) return;
            const newWidth = e.clientX;
            if (newWidth >= 150 && newWidth <= window.innerWidth * 0.8) {
                sidebar.style.width = newWidth + 'px';
                if (sidebar.classList.contains('active')) {
                    sidebarToggle.style.left = (newWidth + 10) + 'px';
                }
            }
        });
        document.addEventListener('mouseup', () => {
            if (isResizingSidebar) {
                isResizingSidebar = false;
                document.body.style.cursor = '';
            }
        });

        updateUIForMode(); updateDisplay();
    </script>
</body>
</html>
