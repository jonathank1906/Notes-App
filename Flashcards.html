<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard (Fixed Spacebar)</title>
    <style>
        /* 1. RESET & BASICS */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0e0e0e; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            overflow: hidden; 
        }

        /* 2. THE SCENE */
        .scene {
            width: 600px;
            height: 400px;
            perspective: 1000px;
            margin: 20px;
            cursor: pointer;
            
            /* Prevent highlight on click */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* 3. THE CARD OBJECT */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            transform-style: preserve-3d;
        }

        .card.is-flipped {
            transform: rotateX(180deg);
        }

        /* 4. CARD FACES */
        .card__face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 1rem;
            background: #2b2b2b; 
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            font-size: 2rem;
            line-height: 1.5;
            font-weight: 400;
            backface-visibility: hidden; /* Hides the back when flipped */
            -webkit-backface-visibility: hidden;
        }

        .card__face--back {
            transform: rotateX(180deg);
        }

        /* Instructions text */
        .instructions {
            position: absolute;
            bottom: 2rem;
            color: #6e6e6e;
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="card">
            <div class="card__face card__face--front">
                Mitochondria
            </div>
            <div class="card__face card__face--back">
                The powerhouse of the cell.
            </div>
        </div>
    </div>

    <div class="instructions">Space or Click to flip</div>

    <script>
        const card = document.querySelector('.card');
        const scene = document.querySelector('.scene');

        // Function to handle the flip
        function flipCard() {
            card.classList.toggle('is-flipped');
        }

        // 1. CLICK EVENT
        scene.addEventListener('click', flipCard);

        // 2. SPACEBAR EVENT (With fix)
        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space') {
                event.preventDefault(); // Stop scrolling
                
                // --- THE FIX ---
                // If the key is being held down (repeating), ignore it.
                if (event.repeat) return; 

                flipCard();
            }
        });
    </script>

</body>
</html>
