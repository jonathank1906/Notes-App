<!DOCTYPE html>
<html>
<head>
    <title>Slide Notes</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 38.25 42.94'%3E%3Cpath d='M17.39.97L2.23 9.72a3.46 3.46 0 0 0-1.73 3v17.5a3.46 3.46 0 0 0 1.73 3l15.16 8.75a3.45 3.45 0 0 0 3.46 0l15.16-8.75a3.46 3.46 0 0 0 1.73-3v-17.5a3.46 3.46 0 0 0-1.73-3L20.85.97a3.45 3.45 0 0 0-3.46 0z' fill='%23181919' stroke='%23231f20' stroke-miterlimit='10'/%3E%3Cpath d='M5.94 28.84l12.92 7.46a.53.53 0 0 0 .52 0l12.92-7.46a.51.51 0 0 0 0-.89l-12.92-7.47a.53.53 0 0 0-.52 0L5.94 27.97a.51.51 0 0 0 0 .87z' fill='%2358595b' opacity='.92'/%3E%3Cpath d='M5.94 21.91l12.92 7.47a.53.53 0 0 0 .52 0l12.92-7.47a.5.5 0 0 0 0-.88l-12.92-7.47a.53.53 0 0 0-.52 0L5.94 21.03a.5.5 0 0 0 0 .88z' fill='%23939598' opacity='.89'/%3E%3Cpath d='M5.94 14.97l12.92 7.47a.53.53 0 0 0 .52 0l12.92-7.47a.51.51 0 0 0 0-.89L19.38 6.62a.53.53 0 0 0-.52 0L5.94 14.08a.51.51 0 0 0 0 .89z' fill='%23d1d3d4' opacity='.93'/%3E%3C/svg%3E">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; height: 100vh; font-family: Arial, sans-serif; background-color: black; color: white; overflow: hidden; display: flex; flex-direction: column; }
        
        /* --- TOP MENU BAR --- */
        #app-menu-bar {
            flex: 0 0 40px; background: #111; border-bottom: 1px solid #222;
            display: flex; align-items: center; padding: 0 15px; gap: 15px; z-index: 105; /* High z-index to stay on top */
        }
        .menu-trigger {
            background: #222; border: 1px solid #444; color: #ddd; padding: 4px 12px;
            font-size: 13px; cursor: pointer; border-radius: 4px; font-weight: bold;
        }
        .menu-trigger:hover { background: #333; color: white; }

        /* Menu Dropdown */
        .menu-dropdown {
            display: none; position: absolute; top: 40px;
            background: #1a1a1a; border: 1px solid #444; border-radius: 0 0 6px 6px;
            min-width: 220px; z-index: 110; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            padding: 5px 0; max-height: 80vh; overflow-y: auto;
        }
        .menu-dropdown.active { display: block; }
        .menu-section { border-bottom: 1px solid #333; padding: 5px 0; }
        .menu-section:last-child { border-bottom: none; }
        .menu-label { padding: 4px 15px; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .menu-item {
            display: block; width: 100%; padding: 8px 15px; text-align: left;
            background: transparent; border: none; color: #ccc; font-size: 13px; cursor: pointer;
        }
        .menu-item:hover { background: #222; color: #fff; }
        .menu-item.danger { color: #ff6666; }
        .menu-item.danger:hover { background: #300; }

        /* Checkbox in Menu */
        .menu-checkbox {
            display: flex; align-items: center; padding: 8px 15px; cursor: pointer; color: #ccc; font-size: 13px;
        }
        .menu-checkbox:hover { background: #222; color: #fff; }
        .menu-checkbox input { margin-right: 10px; accent-color: #888; }

        /* Sliders in Menu */
        .slider-item { padding: 5px 15px; display: flex; flex-direction: column; }
        .slider-item label { font-size: 11px; color: #888; margin-bottom: 2px; }
        .slider-item input { width: 100%; cursor: pointer; accent-color: #888; }

        /* Toggle Switch */
        .mode-toggle { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #aaa; cursor: pointer; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 18px;
        }
        .slider:before {
            position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Drawing Toolbar */
        #top-drawing-tools { display: none; gap: 5px; margin-left: 10px; padding-left: 10px; border-left: 1px solid #333; }
        #top-drawing-tools.active { display: flex; }
        .tool-btn { background: #000; border: 1px solid #444; color: #888; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
        .tool-btn:hover { background: #222; color: #fff; }
        .tool-btn.active { background: #ddd; color: #000; border-color: #fff; font-weight: bold; }

        #last-saved { margin-left: auto; font-size: 11px; color: #555; font-family: monospace; }

        /* --- HEADER & CONTENT --- */
        #sticky-header-group { flex: 0 0 auto; background: #000; border-bottom: 1px solid #222; padding: 10px 20px; z-index: 50; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100px; }
        #display { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 80px; font-weight: bold; user-select: none; line-height: 1; white-space: nowrap; text-align: right; z-index: 20; text-shadow: 0 0 5px black; }
        
        #slideLabel { background: transparent; border-bottom: 1px solid #333; color: #ddd; font-size: 30px; outline: none; padding-bottom: 2px; margin-bottom: 10px; min-width: 200px; max-width: 60%; text-align: center; transition: border-color 0.2s; cursor: text; display: block; }
        #slideLabel:focus { border-bottom: 1px solid #fff; }
        
        /* SIDEBAR TOGGLE (Hamburger) */
        #sidebar-toggle {
            position: absolute; 
            top: 50px; /* Below the 40px menu bar + spacing */
            left: 10px; 
            z-index: 102; 
            background: transparent; 
            border: none; 
            font-size: 24px; 
            cursor: pointer; 
            color: #555;
            transition: left 0.2s ease, color 0.2s;
        }
        #sidebar-toggle:hover { color: #fff; }
        #sidebar-toggle.active {
            left: 260px; /* Move with sidebar width (250px) + padding */
        }

        #sidebar {
            position: absolute; top: 0; left: 0; width: 250px; height: 100%;
            background: #111; border-right: 1px solid #333; z-index: 90;
            transform: translateX(-100%); transition: transform 0.2s ease;
            display: flex; flex-direction: column; padding-top: 60px; /* Space for top bar */
            min-width: 150px; max-width: 80vw;
        }
        #sidebar.active { transform: translateX(0); }
        
        #resizer { width: 10px; height: 100%; position: absolute; right: 0; top: 0; cursor: col-resize; z-index: 100; background: transparent; }
        #resizer:hover { background: rgba(255, 255, 255, 0.1); }
        #toc-list { overflow-y: auto; flex: 1; padding: 10px; }
        #toc-list::-webkit-scrollbar { width: 5px; }
        #toc-list::-webkit-scrollbar-thumb { background: #333; }
        .toc-item { padding: 8px; border-bottom: 1px solid #222; cursor: pointer; font-size: 13px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 10px; }
        .toc-item:hover { background: #333; color: #fff; }
        .toc-item.current { background: #333; color: #fff; border-left: 3px solid #fff; }
        .toc-num { font-weight: bold; min-width: 25px; text-align: right; }
        .toc-item.is-note .toc-num { background: #ddd; color: #000; border-radius: 50%; width: 22px; height: 22px; min-width: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; margin-right: 3px; }
        .toc-item.is-note { color: #aaa; } .toc-item.is-note:hover { color: #fff; }

        #pdf-render-container { display: none; justify-content: center; align-items: center; width: 100%; height: 30vh; position: relative; transition: height 0.1s ease; }
        #the-canvas { max-height: 100%; max-width: 80%; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); position: absolute; z-index: 1; }
        #the-canvas.inverted { filter: invert(1); }
        #draw-canvas { max-height: 100%; max-width: 80%; position: absolute; z-index: 2; touch-action: none; pointer-events: none; }
        #draw-canvas.active { pointer-events: auto; border: 1px dashed rgba(255, 255, 255, 0.2); }
        #no-pdf-msg { color: #444; font-style: italic; position: absolute; font-size: 14px; z-index: 0; }
        .textLayer { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 3; opacity: 1; mix-blend-mode: multiply; line-height: 1.0; pointer-events: auto; }
        .textLayer ::selection { background: rgba(0, 0, 255, 0.3); }
        .textLayer span { color: transparent; position: absolute; white-space: pre; cursor: text; transform-origin: 0% 0%; }
        
        #notes-container { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; border-top: 1px solid #111; background: #050505; }
        #notes-wrapper { width: 100%; max-width: 800px; height: 100%; padding: 20px; overflow-y: auto; position: relative; }
        #notes-wrapper::-webkit-scrollbar { width: 10px; }
        #notes-wrapper::-webkit-scrollbar-track { background: #111; }
        #notes-wrapper::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
        #slideNotesEditor { width: 100%; min-height: 100%; background: transparent; border: none; color: #aaa; font-size: 18px; text-align: left; outline: none; font-family: 'Consolas', 'Courier New', monospace; resize: none; line-height: 1.6; display: none; tab-size: 4; overflow: hidden; }
        #slideNotesPreview { width: 100%; min-height: 100%; color: #ddd; font-size: 18px; line-height: 1.6; display: block; cursor: text; }
        #slideNotesPreview h1, #slideNotesPreview h2, #slideNotesPreview h3 { color: #fff; margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #slideNotesPreview ul, #slideNotesPreview ol { padding-left: 25px; margin-bottom: 10px; }
        #slideNotesPreview p { margin-bottom: 10px; }
        #slideNotesPreview blockquote { border-left: 4px solid #888; margin: 10px 0; padding-left: 15px; color: #aaa; font-style: italic; background: #111; padding: 5px;}
        #slideNotesPreview a { color: #fff; text-decoration: underline; }
        mark { background-color: #fff; color: black; border-radius: 2px; padding: 0 2px; font-weight: bold; }
        #slideNotesPreview pre { background: #1e1e1e !important; padding: 10px; border-radius: 6px; overflow-x: auto; border: 1px solid #333; margin: 10px 0; }
        #slideNotesPreview code { font-family: 'Consolas', 'Courier New', monospace; font-size: 15px; }
        #slideNotesPreview :not(pre) > code { background: #2d2d2d; padding: 2px 5px; border-radius: 4px; color: #ccc; border: 1px solid #444; }
        #slideNotesPreview table { border-collapse: collapse; width: 100%; margin: 15px 0; font-size: 16px; border: 1px solid #444; }
        #slideNotesPreview th, #slideNotesPreview td { border: 1px solid #444; padding: 8px 12px; text-align: left; }
        #slideNotesPreview th { background-color: #222; color: #fff; font-weight: bold; }
        #slideNotesPreview tr:nth-child(even) { background-color: #111; }
        #slideNotesPreview tr:nth-child(odd) { background-color: #161616; }
        
        #rearrange-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 200; overflow-y: auto; padding: 40px; }
        #rearrange-overlay.active { display: flex; flex-direction: column; }
        #rearrange-header { flex: 0 0 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; margin-bottom: 20px; }
        #rearrange-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding-bottom: 100px; }
        .rearrange-card { background: #111; border: 1px solid #333; border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; }
        .card-pdf-preview { height: 120px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: center; align-items: center; font-size: 10px; color: #444; position: relative; }
        .card-pdf-preview canvas { max-width: 100%; max-height: 100%; }
        .card-note-box { flex: 1; padding: 10px; cursor: grab; background: #161616; transition: background 0.2s; min-height: 80px; }
        .card-note-box:hover { background: #222; }
        .card-note-box:active { cursor: grabbing; }
        .card-note-header { font-weight: bold; font-size: 12px; color: #fff; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-note-excerpt { font-size: 10px; color: #888; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .rearrange-card-num { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.7); color: #fff; padding: 2px 6px; font-size: 10px; border-radius: 4px; pointer-events: none; }

        /* Floating Search */
        #floating-search-bar { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #050505; border: 1px solid #444; border-radius: 6px; padding: 8px 12px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.8); align-items: center; gap: 8px; }
        #floating-search-bar.active { display: flex; }
        #search-input { background: #111; border: 1px solid #333; color: white; padding: 5px 8px; font-size: 13px; border-radius: 4px; outline: none; width: 200px; }
        #search-input:focus { border-color: #666; }
        #search-count { font-size: 11px; color: #888; min-width: 40px; text-align: center; }
        .search-btn { background: transparent; border: 1px solid transparent; color: #aaa; cursor: pointer; padding: 4px 6px; border-radius: 3px; font-size: 12px; }
        .search-btn:hover { background: #222; color: #fff; border-color: #333; }
        #scanning-status { font-size: 10px; color: #555; margin-left: 5px; display: none; white-space: nowrap; }

        .hidden-file-input { display:none; }
    </style>
</head>
<body>

    <div id="app-menu-bar">
        <button class="menu-trigger" onclick="toggleMenu('file-menu')">File</button>
        <button class="menu-trigger" onclick="toggleMenu('edit-menu')">Edit</button>
        <button class="menu-trigger" onclick="toggleMenu('fixes-menu')">Fixes</button>
        <button class="menu-trigger" onclick="toggleMenu('appearance-menu')">Appearance</button>
        
        <label class="mode-toggle">
            Standard
            <div class="switch">
                <input type="checkbox" id="mode-switch" onchange="toggleModeFromSwitch()">
                <span class="slider"></span>
            </div>
            PDF
        </label>

        <div id="top-drawing-tools">
            <button class="tool-btn active" id="btn-pen" onclick="setTool('pen')">Pen</button>
            <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')">Eraser</button>
            <button class="tool-btn" onclick="clearSlideDrawing()" style="color:#ff6666;">Clear</button>
        </div>

        <div id="last-saved">Not saved</div>
    </div>

    <div id="file-menu" class="menu-dropdown" style="left: 15px;">
        <button class="menu-item" onclick="document.getElementById('pdf-upload').click()">Open PDF</button>
        <button class="menu-item" onclick="openNotesEditable()">Open Notes</button>
        <button class="menu-item" onclick="saveNotes()">Save</button>
        <button class="menu-item" onclick="saveNotesAs()">Save As New File...</button>
        <label class="menu-checkbox">
            <input type="checkbox" id="autosave-toggle" onchange="toggleAutoSave()" checked>
            Enable Auto-Save
        </label>
    </div>

    <div id="edit-menu" class="menu-dropdown" style="left: 70px;">
        <button class="menu-item" onclick="insertSlide(-1)">Insert Blank Before</button>
        <button class="menu-item" onclick="insertSlide(1)">Insert Blank After</button>
        <button class="menu-item danger" onclick="deleteCurrentSlide()">Delete Current Slide</button>
        <button class="menu-item" onclick="openRearrangeMenu()">Rearrange Notes</button>
    </div>

    <div id="fixes-menu" class="menu-dropdown" style="left: 130px;">
        <button class="menu-item" onclick="shiftContent(-1)">Shift Content Up</button>
        <button class="menu-item" onclick="shiftContent(1)">Shift Content Down</button>
        <button class="menu-item" onclick="syncPdfSlides()">Force Sync PDF Pages</button>
    </div>

    <div id="appearance-menu" class="menu-dropdown" style="left: 195px;">
        <div class="slider-item">
            <label>PDF Preview Size</label>
            <input type="range" min="10" max="90" value="30" oninput="updatePdfSize(this.value)" onchange="refreshPdfResolution()">
        </div>
        <div class="slider-item">
            <label>Text Size</label>
            <input type="range" min="10" max="36" value="18" oninput="updateTextSize(this.value)">
        </div>
        <div class="slider-item">
            <label>Number Size</label>
            <input type="range" min="20" max="120" value="80" oninput="updateNumberSize(this.value)">
        </div>
    </div>

    <input type="file" id="pdf-upload" accept=".pdf" class="hidden-file-input">

    <div id="floating-search-bar">
        <input type="text" id="search-input" placeholder="Find..." oninput="performSearch()">
        <button class="search-btn" title="Clear" onclick="clearSearch()">✖</button>
        <span id="search-count">0/0</span>
        <button class="search-btn" onclick="nextMatch(-1)">▲</button>
        <button class="search-btn" onclick="nextMatch(1)">▼</button>
        <div id="scanning-status">Scanning PDF...</div>
        <button class="search-btn" style="margin-left: 5px;" onclick="toggleSearchBar()">Close</button>
    </div>

    <div id="rearrange-overlay">
        <div id="rearrange-header">
            <h2 style="margin:0; font-size:18px;">Rearrange Notes</h2>
            <button class="action-btn" onclick="closeRearrangeMenu()">Close / Apply</button>
        </div>
        <div id="rearrange-grid"></div>
    </div>

    <div id="sidebar">
        <div id="resizer"></div> <div style="padding:10px; font-weight:bold; color:#fff; border-bottom:1px solid #333;">Slides</div>
        <div id="toc-list"></div>
    </div>
    <button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>

    <div id="sticky-header-group">
        <div id="display">1</div>
        <span id="slideLabel" contenteditable="true" role="textbox" data-placeholder="Header..."></span>
        <div id="pdf-render-container">
            <div id="no-pdf-msg">Load PDF in Menu</div>
            <canvas id="the-canvas" class="inverted"></canvas>
            <div id="text-layer" class="textLayer"></div>
            <canvas id="draw-canvas"></canvas>
        </div>
    </div>

    <div id="notes-container">
        <div id="notes-wrapper">
            <textarea id="slideNotesEditor" placeholder="Type Markdown here..."></textarea>
            <div id="slideNotesPreview" onclick="activateEditor()"></div>
        </div>
    </div>

    <script>
        const pdfCanvas = document.getElementById('the-canvas');
        const drawCanvas = document.getElementById('draw-canvas');
        const textLayerDiv = document.getElementById('text-layer');
        const pdfCtx = pdfCanvas.getContext('2d');
        const drawCtx = drawCanvas.getContext('2d');
        const display = document.getElementById('display');
        const slideLabel = document.getElementById('slideLabel');
        const editor = document.getElementById('slideNotesEditor');
        const preview = document.getElementById('slideNotesPreview');
        const pdfContainer = document.getElementById('pdf-render-container');
        const noPdfMsg = document.getElementById('no-pdf-msg');
        
        // UI Elements
        const mainMenu = document.getElementById('main-menu');
        const modeSwitch = document.getElementById('mode-switch');
        const drawingToolbar = document.getElementById('top-drawing-tools');
        const btnPen = document.getElementById('btn-pen');
        const btnEraser = document.getElementById('btn-eraser');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        
        const searchInput = document.getElementById('search-input');
        const searchCount = document.getElementById('search-count');
        const searchBar = document.getElementById('floating-search-bar');
        const sidebar = document.getElementById('sidebar');
        const tocList = document.getElementById('toc-list');
        const resizer = document.getElementById('resizer');
        const rearrangeOverlay = document.getElementById('rearrange-overlay');
        const rearrangeGrid = document.getElementById('rearrange-grid');
        const lastSavedDiv = document.getElementById('last-saved');
        const scanningStatus = document.getElementById('scanning-status');

        const offscreenCanvas = document.createElement('canvas');
        const offscreenCtx = offscreenCanvas.getContext('2d');

        try {
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) { return hljs.highlight(code, { language: lang }).value; }
                    return hljs.highlightAuto(code).value;
                },
                langPrefix: 'hljs language-'
            });
        } catch(e) { console.error("Marked/HLJS not loaded", e); }

        let state = { count: 1, slides: [] };
        state.slides = [{ type: 'blank', header: '', notes: '', drawings: [] }];
        
        let MODES = ['NUM', 'PDF']; 
        let currentModeIndex = 0; 
        let pdfDoc = null;
        let pdfTextIndex = []; 
        let renderTask = null;
        let searchMatches = []; 
        let currentMatchPos = -1;
        let isEditorActive = false;
        let isDirty = false;
        let historyStacks = {}; 
        let saveTimeout = null;
        let isRestoring = false;
        let fileHandle = null;
        let autoSaveInterval = null;
        let isDrawing = false; let isErasing = false; let currentTool = 'pen'; let currentStrokes = [];
        let isPageRendering = false; let pageNumPending = null;

        // --- CORE FUNCTIONS ---

        function getHistory(index) { if (!historyStacks[index]) historyStacks[index] = { undo: [], redo: [] }; return historyStacks[index]; }
        function pushSnapshot(index, text) { if (isRestoring) return; const h = getHistory(index); if (h.undo.length > 0 && h.undo[h.undo.length - 1] === text) return; h.undo.push(text); h.redo = []; if (h.undo.length > 50) h.undo.shift(); }
        function undo(index) { const h = getHistory(index); if (h.undo.length === 0) return null; const currentText = editor.value; if (h.undo.length > 0 && h.undo[h.undo.length - 1] === currentText) { h.undo.pop(); } if (h.undo.length === 0) return null; h.redo.push(currentText); return h.undo.pop(); }
        function redo(index) { const h = getHistory(index); if (h.redo.length === 0) return null; const next = h.redo.pop(); h.undo.push(editor.value); return next; }
        function checkIfDirty() { if (state.slides.length > 1) return true; const s = state.slides[0]; if (s.header && s.header.trim() !== "") return true; if (s.notes && s.notes.trim() !== "") return true; if (s.drawings && s.drawings.length > 0) return true; return false; }

        function autoResizeTextarea() { editor.style.height = 'auto'; editor.style.height = (editor.scrollHeight) + 'px'; }

                        if (state.slides.length <= 1 && !state.slides[0].notes && !state.slides[0].header) { state.slides = []; for(let i=1; i<=pdfDoc.numPages; i++) { state.slides.push({ type:'pdf', pdfPage:i, header:"", notes:"", drawings:[] }); } state.count = 1; updateDisplay(); }
                        const pdfModeIdx = MODES.indexOf('PDF'); if (pdfModeIdx !== -1) { currentModeIndex = pdfModeIdx; updateUIForMode(); } renderPage(); document.getElementById('pdf-upload').blur();
                    });
                }; fileReader.readAsArrayBuffer(file);
            }
        });
        slideLabel.addEventListener('input', handleInput); editor.addEventListener('input', handleInput); editor.addEventListener('blur', function() { activatePreview(); });
        editor.addEventListener('keydown', (e) => {
            const idx = state.count - 1;
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); activatePreview(); return; }
            if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); isRestoring = true; const restored = undo(idx); if (restored !== null && restored !== undefined) { editor.value = restored; state.slides[idx].notes = restored; } isRestoring = false; return; }
            if (((e.ctrlKey || e.metaKey) && e.key === 'y') || ((e.ctrlKey || e.metaKey) && e.key === 'z' && e.shiftKey)) { e.preventDefault(); isRestoring = true; const restored = redo(idx); if (restored !== null && restored !== undefined) { editor.value = restored; state.slides[idx].notes = restored; } isRestoring = false; return; }
            if (e.key === 'Tab') { e.preventDefault(); pushSnapshot(idx, editor.value); const start = editor.selectionStart; const end = editor.selectionEnd; const val = editor.value; const lineStart = val.lastIndexOf('\n', start - 1) + 1; if (e.shiftKey) { const line = val.substring(lineStart); const match = line.match(/^ {1,4}/); if (match) { const len = match[0].length; editor.value = val.substring(0, lineStart) + val.substring(lineStart + len); editor.selectionStart = Math.max(lineStart, start - len); editor.selectionEnd = Math.max(lineStart, end - len); } } else { editor.value = val.substring(0, lineStart) + "    " + val.substring(lineStart); editor.selectionStart = start + 4; editor.selectionEnd = end + 4; } handleInput(); }
            if (e.key === 'Backspace' || e.key === 'Delete' || (e.ctrlKey && e.key === 'x') || (e.ctrlKey && e.key === 'v')) { pushSnapshot(idx, editor.value); }
            if (e.key === 'Enter') { pushSnapshot(idx, editor.value); const start = editor.selectionStart; const end = editor.selectionEnd; const val = editor.value; const lineStart = val.lastIndexOf('\n', start - 1) + 1; const match = val.substring(lineStart, start).match(/^(\s*)([-*]|\d+\.)\s/); if (match) { e.preventDefault(); const indent = match[1]; const marker = match[2]; let nextMarker = marker; if (/^\d+\.$/.test(marker)) { const num = parseInt(marker); nextMarker = (num + 1) + "."; } const prefix = `\n${indent}${nextMarker} `; const newVal = val.substring(0, start) + prefix + val.substring(end); editor.value = newVal; editor.selectionStart = editor.selectionEnd = start + prefix.length; handleInput(); } }
        });
        let lastScrollTime = 0;
        document.addEventListener('wheel', (e) => {
            const notesDiv = document.getElementById('notes-wrapper'); const sidebarDiv = document.getElementById('sidebar'); 
            if (notesDiv.contains(e.target) || sidebarDiv.contains(e.target)) return;
            const now = Date.now(); if (now - lastScrollTime < 30) return;
            if (e.deltaY > 0) { handleNav('forward'); lastScrollTime = now; } else if (e.deltaY < 0) { handleNav('backward'); lastScrollTime = now; }
        });
        drawCanvas.addEventListener('mousedown', (e) => { const norm = getNormalizedPos(e); if (currentTool === 'eraser') { isErasing = true; eraseStrokeAtInternal(toPixel(norm.x, norm.y)); } else { isDrawing = true; currentStrokes.push({ points: [norm] }); const px = toPixel(norm.x, norm.y); drawCtx.lineWidth=3; drawCtx.strokeStyle='red'; drawCtx.lineCap='round'; drawCtx.beginPath(); drawCtx.moveTo(px.x, px.y); drawCtx.lineTo(px.x, px.y); drawCtx.stroke(); } });
        drawCanvas.addEventListener('mousemove', (e) => { const norm = getNormalizedPos(e); const px = toPixel(norm.x, norm.y); if (currentTool === 'eraser' && isErasing) { eraseStrokeAtInternal(px); return; } if (currentTool === 'pen' && isDrawing) { const path = currentStrokes[currentStrokes.length - 1]; const last = path.points[path.points.length - 1]; const lastPx = toPixel(last.x, last.y); drawCtx.lineWidth=3; drawCtx.strokeStyle='red'; drawCtx.lineCap='round'; drawCtx.beginPath(); drawCtx.moveTo(lastPx.x, lastPx.y); drawCtx.lineTo(px.x, px.y); drawCtx.stroke(); path.points.push(norm); } });
        drawCanvas.addEventListener('mouseup', endAction); drawCanvas.addEventListener('mouseout', endAction);

        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); if(e.shiftKey) nextMatch(-1); else nextMatch(1); } });
        document.addEventListener('keydown', e => {
            if (document.activeElement === editor || document.activeElement === searchInput) return;
            if (document.activeElement === slideLabel) { if (['ArrowUp','ArrowDown'].includes(e.key)) { e.preventDefault(); handleNav(e.key === 'ArrowUp' ? 'forward' : 'backward'); } if (e.key === 'Enter') { e.preventDefault(); document.activeElement.blur(); } return; }
            if (e.key === 'i' && !isEditorActive) { pdfCanvas.classList.toggle('inverted'); if (state.slides[state.count-1].type === 'blank') renderPage(); return; }
            if ((e.ctrlKey || e.metaKey) && !e.shiftKey) { if (e.key === 'ArrowUp' || e.key === 'ArrowRight') { e.preventDefault(); handleNav('forward'); return; } if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') { e.preventDefault(); handleNav('backward'); return; } }
            if(e.key === 'ArrowUp' || e.key === 'ArrowRight') handleNav('forward'); else if(e.key === 'ArrowDown' || e.key === 'ArrowLeft') handleNav('backward');
        });

        // Sidebar resize functionality
        let isResizingSidebar = false;
        resizer.addEventListener('mousedown', (e) => {
            isResizingSidebar = true;
            document.body.style.cursor = 'col-resize';
            e.preventDefault();
        });
        document.addEventListener('mousemove', (e) => {
            if (!isResizingSidebar) return;
            const newWidth = e.clientX;
            if (newWidth >= 150 && newWidth <= window.innerWidth * 0.8) {
                sidebar.style.width = newWidth + 'px';
                if (sidebar.classList.contains('active')) {
                    sidebarToggle.style.left = (newWidth + 10) + 'px';
                }
            }
        });
        document.addEventListener('mouseup', () => {
            if (isResizingSidebar) {
                isResizingSidebar = false;
                document.body.style.cursor = '';
            }
        });

        updateUIForMode(); updateDisplay();
    </script>
